<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <!-- Background gradient definition for the inverted triangle -->
  <defs>
    <linearGradient id="consciousnessGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="15%" stop-color="#7c3aed"/>
      <stop offset="30%" stop-color="#3b82f6"/>
      <stop offset="45%" stop-color="#22c55e"/>
      <stop offset="60%" stop-color="#eab308"/>
      <stop offset="75%" stop-color="#f97316"/>
      <stop offset="90%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="480" y="45" font-size="36" font-weight="bold" fill="#d1d5db" text-anchor="middle">Omega</text>

  <!-- Inverted Triangle -->
  <polygon points="330,70 630,70 480,550" fill="url(#consciousnessGradient)" stroke="#6b7280" stroke-width="1"/>

  <!-- Ultimate Consciousness text inside triangle -->
  <text x="480" y="120" font-size="16" fill="white" text-anchor="middle" font-weight="600">Ultimate</text>
  <text x="480" y="140" font-size="16" fill="white" text-anchor="middle" font-weight="600">Consciousness</text>

  <!-- Alpha Point label -->
  <text x="480" y="585" font-size="18" fill="#d1d5db" text-anchor="middle" font-weight="600">Alpha Point</text>

  <!-- Expanded/Contracted Arrow on right -->
  <line x1="680" y1="100" x2="680" y2="520" stroke="#facc15" stroke-width="2"/>
  <polygon points="680,100 674,115 686,115" fill="#facc15"/>
  <polygon points="680,520 674,505 686,505" fill="#ef4444"/>
  <text x="720" y="150" font-size="16" fill="#4ade80" font-style="italic">Expanded</text>
  <text x="720" y="490" font-size="16" fill="#ef4444" font-style="italic">Contracted</text>

  <!-- Energy Scale - Left side -->
  <!-- Level 700+ -->
  <text x="90" y="95" font-size="16" fill="#a855f7" text-anchor="end" font-weight="600">700+</text>
  <text x="100" y="95" font-size="16" fill="#d1d5db">Enlightenment</text>

  <!-- Level 600 -->
  <text x="90" y="130" font-size="16" fill="#8b5cf6" text-anchor="end" font-weight="600">600</text>
  <text x="100" y="130" font-size="16" fill="#d1d5db">Peace</text>

  <!-- Level 540 -->
  <text x="90" y="165" font-size="16" fill="#7c3aed" text-anchor="end" font-weight="600">540</text>
  <text x="100" y="165" font-size="16" fill="#d1d5db">Joy</text>

  <!-- Level 500 -->
  <text x="90" y="200" font-size="16" fill="#6366f1" text-anchor="end" font-weight="600">500</text>
  <text x="100" y="200" font-size="16" fill="#d1d5db">Love</text>

  <!-- Level 400 -->
  <text x="90" y="235" font-size="16" fill="#3b82f6" text-anchor="end" font-weight="600">400</text>
  <text x="100" y="235" font-size="16" fill="#d1d5db">Reason</text>

  <!-- Level 350 -->
  <text x="90" y="270" font-size="16" fill="#22c55e" text-anchor="end" font-weight="600">350</text>
  <text x="100" y="270" font-size="16" fill="#d1d5db">Acceptance</text>

  <!-- Level 310 -->
  <text x="90" y="305" font-size="16" fill="#4ade80" text-anchor="end" font-weight="600">310</text>
  <text x="100" y="305" font-size="16" fill="#d1d5db">Willingness</text>

  <!-- Level 250 -->
  <text x="90" y="340" font-size="16" fill="#84cc16" text-anchor="end" font-weight="600">250</text>
  <text x="100" y="340" font-size="16" fill="#d1d5db">Neutrality</text>

  <!-- Level 200 - Critical threshold -->
  <text x="90" y="375" font-size="16" fill="#eab308" text-anchor="end" font-weight="600">200</text>
  <text x="100" y="375" font-size="16" fill="#d1d5db">Courage</text>
  <line x1="310" y1="370" x2="650" y2="370" stroke="#eab308" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Level 175 -->
  <text x="90" y="405" font-size="16" fill="#f59e0b" text-anchor="end" font-weight="600">175</text>
  <text x="100" y="405" font-size="16" fill="#d1d5db">Pride</text>

  <!-- Level 150 -->
  <text x="90" y="435" font-size="16" fill="#f97316" text-anchor="end" font-weight="600">150</text>
  <text x="100" y="435" font-size="16" fill="#d1d5db">Anger</text>

  <!-- Level 125 -->
  <text x="90" y="465" font-size="16" fill="#ea580c" text-anchor="end" font-weight="600">125</text>
  <text x="100" y="465" font-size="16" fill="#d1d5db">Desire</text>

  <!-- Level 100 -->
  <text x="90" y="490" font-size="16" fill="#ef4444" text-anchor="end" font-weight="600">100</text>
  <text x="100" y="490" font-size="16" fill="#d1d5db">Fear</text>

  <!-- Level 75 -->
  <text x="90" y="515" font-size="16" fill="#dc2626" text-anchor="end" font-weight="600">75</text>
  <text x="100" y="515" font-size="16" fill="#d1d5db">Grief</text>

  <!-- Level 50 -->
  <text x="90" y="535" font-size="16" fill="#b91c1c" text-anchor="end" font-weight="600">50</text>
  <text x="100" y="535" font-size="16" fill="#d1d5db">Apathy</text>

  <!-- Level 30 -->
  <text x="90" y="555" font-size="16" fill="#991b1b" text-anchor="end" font-weight="600">30</text>
  <text x="100" y="555" font-size="16" fill="#d1d5db">Guilt</text>

  <!-- Level 20 -->
  <text x="90" y="575" font-size="16" fill="#7f1d1d" text-anchor="end" font-weight="600">20</text>
  <text x="100" y="575" font-size="16" fill="#d1d5db">Shame</text>
</svg>
