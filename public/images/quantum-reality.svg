<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <!-- Gradient for cosmic background -->
    <linearGradient id="cosmicBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Energy gradient -->
    <radialGradient id="energyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ea580c;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#c2410c;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#cosmicBg)"/>

  <!-- Stars -->
  <circle cx="50" cy="50" r="1" fill="white" opacity="0.8"/>
  <circle cx="150" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="250" cy="30" r="1" fill="white" opacity="0.9"/>
  <circle cx="100" cy="150" r="1" fill="white" opacity="0.7"/>
  <circle cx="700" cy="60" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="750" cy="120" r="1" fill="white" opacity="0.6"/>
  <circle cx="650" cy="40" r="1" fill="white" opacity="0.9"/>
  <circle cx="600" cy="350" r="1" fill="white" opacity="0.7"/>
  <circle cx="720" cy="300" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="80" cy="320" r="1" fill="white" opacity="0.6"/>
  <circle cx="200" cy="360" r="1" fill="white" opacity="0.9"/>

  <!-- Einstein profile silhouette (upper right) -->
  <g transform="translate(735, 95) scale(0.7)">
    <!-- Wild white/gray hair - the iconic Einstein look -->
    <path d="M-25,-60
             C-35,-65 -40,-55 -38,-45
             C-45,-50 -48,-40 -42,-32
             C-50,-35 -50,-22 -42,-18
             C-48,-15 -45,-5 -38,-5
             C-42,0 -38,8 -32,5
             L-28,15
             L25,15
             L28,5
             C32,8 38,5 38,0
             C42,-2 45,-10 40,-15
             C48,-18 48,-28 42,-32
             C50,-35 48,-45 42,-50
             C48,-55 42,-65 35,-60
             C38,-70 28,-75 20,-68
             C22,-78 10,-82 0,-75
             C-5,-82 -18,-78 -15,-68
             C-22,-75 -32,-70 -25,-60
             Z" fill="#d1d5db"/>
    <!-- Face shape -->
    <path d="M-28,15
             C-30,25 -28,40 -22,50
             L-15,65
             C-10,72 5,72 12,68
             L18,60
             C24,50 28,35 26,15
             Z" fill="#9ca3af"/>
    <!-- Forehead wrinkles -->
    <path d="M-15,-30 Q0,-33 15,-30" stroke="#6b7280" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M-12,-25 Q0,-27 12,-25" stroke="#6b7280" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- Bushy eyebrows -->
    <path d="M-20,-8 Q-12,-14 -4,-10" stroke="#9ca3af" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M4,-10 Q12,-14 20,-8" stroke="#9ca3af" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Deep-set eyes -->
    <ellipse cx="-12" cy="2" rx="5" ry="3" fill="#374151"/>
    <ellipse cx="12" cy="2" rx="5" ry="3" fill="#374151"/>
    <circle cx="-12" cy="2" r="2" fill="#1f2937"/>
    <circle cx="12" cy="2" r="2" fill="#1f2937"/>
    <!-- Distinctive nose -->
    <path d="M0,5 L2,20 Q5,28 0,30 Q-5,28 -3,25 L0,20" fill="#7f8c9a" stroke="#6b7280" stroke-width="1"/>
    <!-- Iconic thick mustache -->
    <path d="M-18,38 Q-10,32 0,35 Q10,32 18,38 Q10,45 0,42 Q-10,45 -18,38 Z" fill="#9ca3af"/>
    <!-- Mouth -->
    <path d="M-8,50 Q0,54 8,50" stroke="#6b7280" stroke-width="1.5" fill="none"/>
    <!-- Chin -->
    <ellipse cx="0" cy="62" rx="10" ry="6" fill="#8b95a3"/>
  </g>

  <!-- Atom symbol -->
  <g transform="translate(100, 165)">
    <ellipse cx="0" cy="0" rx="35" ry="12" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="35" ry="12" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.8" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="35" ry="12" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.8" transform="rotate(-60)"/>
    <circle cx="0" cy="0" r="7" fill="#3b82f6"/>
  </g>

  <!-- E=mc² equation (left side) -->
  <text x="150" y="210" font-size="48" font-weight="bold" fill="white" filter="url(#glow)">E=mc</text>
  <text x="310" y="185" font-size="28" font-weight="bold" fill="white" filter="url(#glow)">2</text>

  <!-- Derivation Arrow (mathematical implication symbol) -->
  <text x="400" y="215" font-size="72" fill="#f97316" text-anchor="middle" filter="url(#glow)">⟹</text>

  <!-- m=E/c² equation (right side) -->
  <text x="510" y="215" font-size="48" font-weight="bold" fill="white" filter="url(#glow)">m=</text>
  <text x="615" y="185" font-size="42" font-weight="bold" fill="white" filter="url(#glow)">E</text>
  <line x1="610" y1="200" x2="670" y2="200" stroke="white" stroke-width="3"/>
  <text x="620" y="240" font-size="32" font-weight="bold" fill="white" filter="url(#glow)">c</text>
  <text x="655" y="222" font-size="20" font-weight="bold" fill="white" filter="url(#glow)">2</text>
</svg>
