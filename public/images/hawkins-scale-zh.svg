<svg viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <!-- Background gradient definition for the inverted triangle -->
  <defs>
    <linearGradient id="consciousnessGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="15%" stop-color="#7c3aed"/>
      <stop offset="30%" stop-color="#3b82f6"/>
      <stop offset="45%" stop-color="#22c55e"/>
      <stop offset="60%" stop-color="#eab308"/>
      <stop offset="75%" stop-color="#f97316"/>
      <stop offset="90%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="28" font-size="26" font-weight="bold" fill="#d1d5db" text-anchor="middle">霍金斯能量层级：意识的能量等级</text>
  <text x="480" y="78" font-size="18" font-weight="600" fill="#a855f7" text-anchor="middle">Omega 终点</text>

  <!-- Inverted Triangle -->
  <polygon points="330,88 630,88 480,568" fill="url(#consciousnessGradient)" stroke="#6b7280" stroke-width="1"/>

  <!-- Ultimate Consciousness text inside triangle -->
  <text x="480" y="138" font-size="16" fill="white" text-anchor="middle" font-weight="600">终极</text>
  <text x="480" y="158" font-size="16" fill="white" text-anchor="middle" font-weight="600">意识</text>

  <!-- Alpha Point label -->
  <text x="480" y="603" font-size="18" fill="#dc2626" text-anchor="middle" font-weight="600">Alpha 起点</text>

  <!-- Expanded/Contracted Arrow on right -->
  <line x1="680" y1="118" x2="680" y2="538" stroke="#facc15" stroke-width="2"/>
  <polygon points="680,118 674,133 686,133" fill="#facc15"/>
  <polygon points="680,538 674,523 686,523" fill="#ef4444"/>
  <text x="720" y="168" font-size="16" fill="#4ade80" font-style="italic">扩展</text>
  <text x="720" y="508" font-size="16" fill="#ef4444" font-style="italic">收缩</text>

  <!-- Energy Scale - Left side -->
  <!-- Level 700+ -->
  <text x="90" y="113" font-size="16" fill="#a855f7" text-anchor="end" font-weight="600">700+</text>
  <text x="100" y="113" font-size="16" fill="#d1d5db">开悟</text>

  <!-- Level 600 -->
  <text x="90" y="148" font-size="16" fill="#8b5cf6" text-anchor="end" font-weight="600">600</text>
  <text x="100" y="148" font-size="16" fill="#d1d5db">和平</text>

  <!-- Level 540 -->
  <text x="90" y="183" font-size="16" fill="#7c3aed" text-anchor="end" font-weight="600">540</text>
  <text x="100" y="183" font-size="16" fill="#d1d5db">喜悦</text>

  <!-- Level 500 -->
  <text x="90" y="218" font-size="16" fill="#6366f1" text-anchor="end" font-weight="600">500</text>
  <text x="100" y="218" font-size="16" fill="#d1d5db">爱</text>

  <!-- Level 400 -->
  <text x="90" y="253" font-size="16" fill="#3b82f6" text-anchor="end" font-weight="600">400</text>
  <text x="100" y="253" font-size="16" fill="#d1d5db">理性</text>

  <!-- Level 350 -->
  <text x="90" y="288" font-size="16" fill="#22c55e" text-anchor="end" font-weight="600">350</text>
  <text x="100" y="288" font-size="16" fill="#d1d5db">接纳</text>

  <!-- Level 310 -->
  <text x="90" y="323" font-size="16" fill="#4ade80" text-anchor="end" font-weight="600">310</text>
  <text x="100" y="323" font-size="16" fill="#d1d5db">意愿</text>

  <!-- Level 250 -->
  <text x="90" y="358" font-size="16" fill="#84cc16" text-anchor="end" font-weight="600">250</text>
  <text x="100" y="358" font-size="16" fill="#d1d5db">中立</text>

  <!-- Level 200 - Critical threshold -->
  <text x="90" y="393" font-size="16" fill="#eab308" text-anchor="end" font-weight="600">200</text>
  <text x="100" y="393" font-size="16" fill="#d1d5db">勇气</text>
  <line x1="310" y1="388" x2="650" y2="388" stroke="#eab308" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Level 175 -->
  <text x="90" y="423" font-size="16" fill="#f59e0b" text-anchor="end" font-weight="600">175</text>
  <text x="100" y="423" font-size="16" fill="#d1d5db">骄傲</text>

  <!-- Level 150 -->
  <text x="90" y="453" font-size="16" fill="#f97316" text-anchor="end" font-weight="600">150</text>
  <text x="100" y="453" font-size="16" fill="#d1d5db">愤怒</text>

  <!-- Level 125 -->
  <text x="90" y="483" font-size="16" fill="#ea580c" text-anchor="end" font-weight="600">125</text>
  <text x="100" y="483" font-size="16" fill="#d1d5db">欲望</text>

  <!-- Level 100 -->
  <text x="90" y="508" font-size="16" fill="#ef4444" text-anchor="end" font-weight="600">100</text>
  <text x="100" y="508" font-size="16" fill="#d1d5db">恐惧</text>

  <!-- Level 75 -->
  <text x="90" y="533" font-size="16" fill="#dc2626" text-anchor="end" font-weight="600">75</text>
  <text x="100" y="533" font-size="16" fill="#d1d5db">悲伤</text>

  <!-- Level 50 -->
  <text x="90" y="553" font-size="16" fill="#b91c1c" text-anchor="end" font-weight="600">50</text>
  <text x="100" y="553" font-size="16" fill="#d1d5db">冷漠</text>

  <!-- Level 30 -->
  <text x="90" y="573" font-size="16" fill="#991b1b" text-anchor="end" font-weight="600">30</text>
  <text x="100" y="573" font-size="16" fill="#d1d5db">内疚</text>

  <!-- Level 20 -->
  <text x="90" y="593" font-size="16" fill="#7f1d1d" text-anchor="end" font-weight="600">20</text>
  <text x="100" y="593" font-size="16" fill="#d1d5db">羞耻</text>
</svg>
